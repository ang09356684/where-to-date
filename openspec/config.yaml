schema: spec-driven

context: |
  Product: No Idea App — activity itinerary recommendation tool for when users
  don't know what to do. Generates random itineraries from real-time data.
  Covers Taipei and Taoyuan areas.

  Tech stack:
    - Next.js 16 (App Router) + TypeScript + Tailwind CSS
    - JSON file storage (no database) — data/raw/ for source data, data/combined/ for merged
    - 12 external data sources synced via scraping + APIs
    - Favorites stored in browser localStorage

  Data categories:
    - exhibition: from Ministry of Culture, Huashan, Songshan, TWTC, NTSEC
    - concert: from Ministry of Culture (music), tixCraft, ERA Ticket
    - theater: from Ministry of Culture (drama)
    - movie: from atmovies.com.tw
    - attraction: Taipei curated list + Taoyuan Tourism API
    - restaurant/cafe/bar: hand-curated (Taipei 50 + Taoyuan 15)

  Key features (v0.1.0):
    - Filter by city (Taipei/Taoyuan) + district + type + indoor/outdoor
    - Generate 2 itineraries × 3 places each, with shuffle
    - Browse lists for each category with source filtering
    - Favorites with expired detection
    - Light/dark mode

  Conventions:
    - Commit messages and code comments in English
    - UI text in Traditional Chinese
    - Conventional commits (feat/fix/refactor/docs/test/chore)
    - Immutable data patterns preferred

rules:
  proposal:
    - Always include a "Non-goals" section
    - Reference affected data sources when proposing data changes
  tasks:
    - Break tasks into chunks of max 2 hours
    - Tag tasks with affected file paths
